<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#06080c" />
    <meta name="color-scheme" content="dark" />
    <title>Message</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0a0d12;
        --mist: rgba(255, 255, 255, 0.06);
        --line: rgba(255, 255, 255, 0.12);
        --text: #e8ecf1;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent-dim: rgba(56, 189, 248, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        font-family: "Source Sans 3", system-ui, sans-serif;
        color: var(--text);
        overflow-x: hidden;
        background: #06080c;
      }

      .bg-gradient {
        position: fixed;
        inset: 0;
        background: linear-gradient(
          125deg,
          #0c1220 0%,
          #151528 25%,
          #0d1f35 50%,
          #1a1030 75%,
          #0c1220 100%
        );
        background-size: 320% 320%;
        animation: shift 22s ease-in-out infinite;
      }

      @keyframes shift {
        0%,
        100% {
          background-position: 0% 40%;
        }
        50% {
          background-position: 100% 60%;
        }
      }

      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(72px);
        pointer-events: none;
        opacity: 0.5;
      }

      .orb-1 {
        width: min(55vw, 420px);
        height: min(55vw, 420px);
        background: #4f46e5;
        top: -12%;
        right: -8%;
        animation: drift-a 16s ease-in-out infinite;
      }

      .orb-2 {
        width: min(50vw, 380px);
        height: min(50vw, 380px);
        background: #0ea5e9;
        bottom: -15%;
        left: -12%;
        animation: drift-b 18s ease-in-out infinite;
      }

      .orb-3 {
        width: min(35vw, 260px);
        height: min(35vw, 260px);
        background: #a855f7;
        top: 42%;
        left: 35%;
        opacity: 0.28;
        animation: drift-c 20s ease-in-out infinite;
      }

      @keyframes drift-a {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-32px, 28px) scale(1.08);
        }
      }

      @keyframes drift-b {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(36px, -24px) scale(1.06);
        }
      }

      @keyframes drift-c {
        0%,
        100% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(-20px, -16px);
        }
      }

      .grid {
        position: fixed;
        inset: 0;
        background-image: linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black 20%, transparent 70%);
        opacity: 0.35;
        pointer-events: none;
      }

      main {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem 3rem;
        padding-top: max(2rem, env(safe-area-inset-top));
        padding-right: max(1.25rem, env(safe-area-inset-right));
        padding-bottom: max(3rem, env(safe-area-inset-bottom));
        padding-left: max(1.25rem, env(safe-area-inset-left));
      }

      .stage {
        width: 100%;
        max-width: min(520px, 100%);
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        background: var(--accent-dim);
        border: 1px solid rgba(56, 189, 248, 0.35);
        opacity: 0;
        transform: translateY(12px);
        animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse-dot 2s ease-in-out infinite;
      }

      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.85);
        }
      }

      h1 {
        font-family: Outfit, system-ui, sans-serif;
        font-size: clamp(1.85rem, 5vw, 2.35rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.15;
        margin: 1.35rem 0 0.5rem;
        opacity: 0;
        transform: translateY(18px);
        animation: rise 0.95s cubic-bezier(0.22, 1, 0.36, 1) 0.32s forwards;
        background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .rule {
        width: 0;
        height: 2px;
        margin: 1.25rem auto 0;
        border-radius: 2px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        animation: expand 1s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
      }

      @keyframes expand {
        to {
          width: min(180px, 40%);
        }
      }

      .card {
        margin-top: 1.75rem;
        padding: 1.65rem 1.5rem;
        text-align: left;
        border-radius: 20px;
        background: var(--mist);
        border: 1px solid var(--line);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        opacity: 0;
        transform: translateY(22px) scale(0.98);
        animation: card-in 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
      }

      @keyframes rise {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes card-in {
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .message {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.65;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .message a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid rgba(56, 189, 248, 0.45);
        transition: color 0.15s ease, border-color 0.15s ease;
      }

      .message a:hover {
        color: #7dd3fc;
        border-bottom-color: #7dd3fc;
      }

      .cta-row {
        margin-top: 1.35rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.65rem 1.35rem;
        font-family: Outfit, system-ui, sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        color: #041018;
        text-decoration: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #38bdf8 0%, #22d3ee 100%);
        box-shadow: 0 8px 32px rgba(56, 189, 248, 0.35);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        opacity: 0;
        animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.85s forwards;
      }

      .cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 40px rgba(56, 189, 248, 0.45);
      }

      .cta:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      footer {
        margin-top: 2.5rem;
        font-size: 0.8rem;
        color: var(--muted);
        opacity: 0;
        animation: rise 0.8s ease 1.1s forwards;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 0.35rem 0.5rem;
        line-height: 1.5;
        padding: 0 0.25rem;
      }

      footer a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid rgba(56, 189, 248, 0.35);
        touch-action: manipulation;
      }

      footer a:hover {
        color: #7dd3fc;
      }

      @media (max-width: 540px) {
        main {
          padding-top: max(1.25rem, env(safe-area-inset-top));
          padding-bottom: max(1.75rem, env(safe-area-inset-bottom));
        }

        .card {
          padding: 1.25rem 1.1rem;
          border-radius: 16px;
        }

        .message {
          font-size: 1rem;
        }

        .cta-row {
          flex-direction: column;
        }

        .cta {
          width: 100%;
          min-height: 48px;
          padding: 0.75rem 1.25rem;
          touch-action: manipulation;
        }

        footer {
          flex-direction: column;
          gap: 0.5rem;
        }

        footer .footer-sep {
          display: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .bg-gradient,
        .orb,
        .badge,
        .badge-dot,
        h1,
        .rule,
        .card,
        .cta,
        footer {
          animation: none !important;
        }

        .bg-gradient {
          background-size: 100% 100%;
        }

        .badge,
        h1,
        .rule,
        .card,
        .cta,
        footer {
          opacity: 1;
          transform: none;
        }

        .rule {
          width: min(180px, 40%);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-gradient" aria-hidden="true"></div>
    <div class="orb orb-1" aria-hidden="true"></div>
    <div class="orb orb-2" aria-hidden="true"></div>
    <div class="orb orb-3" aria-hidden="true"></div>
    <div class="grid" aria-hidden="true"></div>

    <main>
      <div class="stage">
        <div class="badge"><span class="badge-dot" aria-hidden="true"></span> From QR</div>
        <h1 id="headline">Welcome</h1>
        <div class="rule" aria-hidden="true"></div>

        <div class="card">
          <p class="message" id="message"></p>
          <div class="cta-row" id="cta-row" hidden>
            <a class="cta" id="open-link" href="#" rel="noopener noreferrer">Open link</a>
          </div>
        </div>

        <footer>
          <a href="./index.html">Create or scan another QR</a>
          <span class="footer-sep" aria-hidden="true">·</span>
          <span>Runs in your browser</span>
        </footer>
      </div>
    </main>
    <script type="module" src="./view.js"></script>
  </body>
</html>
